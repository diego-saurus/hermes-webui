services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - AGENT_TAG=${AGENT_TAG:-latest}
        - WEBUI_BRANCH=${WEBUI_BRANCH:-master}
    container_name: hermes-ui
    volumes:
      # ── Data ──
      # All hermes data (config, sessions, memory, skills, credentials).
      # Editable from the host — e.g. nano ~/.hermes-data/.env
      - /root/.hermes-data:/opt/data
      # ── Workspaces ──
      # All workspaces live under ~/hermes-workspaces on the host.
      # Create subdirectories for new projects — they appear in the UI automatically.
      # Default workspace: ~/hermes-workspaces/default
      - /root/hermes-workspace:/opt/data/workspaces
    environment:
      - HERMES_HOME=/opt/data
      # Match your host UID/GID so files created by the agent are owned by you.
      # Run: id -u && id -g
      - HERMES_UID=1000
      - HERMES_GID=1000
      # Optional: protect the web UI with a password
      - HERMES_WEBUI_PASSWORD=${HERMES_SERVICE_PASSWORD}
      # Hermes dashboard basic auth
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
    restart: unless-stopped

  # ── File Browser ──
  # Web UI for browsing the same data the hermes agent works on. Binds the
  # same host paths hermes uses and merges them under /srv, so files created
  # in either UI are visible to the other. The default admin password is
  # auto-generated and printed in the container logs on first boot (see
  # "First Boot" in filebrowser.md). PID/GID 1000 inside the container
  # matches HERMES_UID/HERMES_GID above, so bind-mount permissions line up.
  filebrowser:
    image: filebrowser/filebrowser
    container_name: hermes-filebrowser
    volumes:
      - /root/.hermes-data:/srv/.hermes-data
      - /root/hermes-workspace:/srv/workspaces
      - filebrowser_database:/database
      - filebrowser_config:/config
    environment:
      - SERVICE_URL_FILEBROWSER_80
    restart: unless-stopped
