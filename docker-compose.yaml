services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - AGENT_TAG=${AGENT_TAG:-latest}
        - WEBUI_BRANCH=${WEBUI_BRANCH:-master}
    container_name: hermes-ui
    ports:
      - "8787:8787" # Hermes Web UI
      - "8642:8642" # Hermes Gateway API
      - "9119:9119" # Hermes Dashboard
    volumes:
      # ── Data ──
      # All hermes data (config, sessions, memory, skills, credentials).
      # Editable from the host — e.g. nano ~/.hermes-data/.env
      - ${HERMES_HOME}:/opt/data
      # ── Workspaces ──
      # All workspaces live under ~/hermes-workspaces on the host.
      # Create subdirectories for new projects — they appear in the UI automatically.
      # Default workspace: ~/hermes-workspaces/default
      - ${HERMES_WORKSPACE}:/opt/data/workspaces
    environment:
      - HERMES_HOME=/opt/data
      # Match your host UID/GID so files created by the agent are owned by you.
      # Run: id -u && id -g
      - HERMES_UID=1000
      - HERMES_GID=1000
      # Optional: protect the web UI with a password
      - HERMES_WEBUI_PASSWORD=${HERMES_SERVICE_PASSWORD}
    restart: unless-stopped
